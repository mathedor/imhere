<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I'm Here · Apresentação da Plataforma</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --r:#ef2c39; --r-soft:#ff5a65; --r-deep:#dc1f2b;
  --pp:#a855f7;
  --ink:#0a0a0b; --panel:#131316; --panel2:#1c1c20;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
  --tx:#f5f5f7; --mut:#b8b8c0; --mut2:#6b6b75;
  --red:#fb7185; --amber:#fbbf24; --grn:#22c55e; --cy:#38bdf8;
  --sans:'Inter',system-ui,sans-serif; --disp:'Outfit','Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--tx);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden}
img{max-width:100%;display:block}

#deck{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth}
#deck::-webkit-scrollbar{width:0}
.slide{min-height:100vh;scroll-snap-align:start;position:relative;display:flex;flex-direction:column;justify-content:center;padding:64px 88px 72px;overflow:hidden}
.slide::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:44px 44px;mask-image:radial-gradient(ellipse 90% 80% at 70% 30%,#000 20%,transparent 80%)}
.glow{position:absolute;border-radius:50%;filter:blur(90px);opacity:.22;pointer-events:none}
.glow.a{width:540px;height:540px;background:var(--r);top:-170px;right:-130px}
.glow.b{width:420px;height:420px;background:var(--pp);bottom:-180px;left:-140px;opacity:.16}

#bar{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.06);z-index:60}
#bar>i{display:block;height:100%;width:0;background:var(--r);box-shadow:0 0 18px var(--r);transition:width .3s}
#hud{position:fixed;top:18px;right:26px;z-index:60;display:flex;align-items:center;gap:14px;font-family:var(--disp);font-size:12px;color:var(--mut)}
#hud b{color:var(--tx);font-weight:700}
#hud .k{border:1px solid var(--line2);border-radius:7px;padding:4px 8px;color:var(--mut);cursor:pointer;transition:.2s}
#hud .k:hover{color:#fff;background:var(--r-deep);border-color:var(--r-deep)}
#rail{position:fixed;left:22px;top:50%;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;gap:11px}
#rail a{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--mut2);font-size:11px;font-family:var(--disp);font-weight:700;letter-spacing:.02em}
#rail .d{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--mut2);transition:.25s;flex:none}
#rail a .t{opacity:0;transform:translateX(-6px);transition:.25s;white-space:nowrap}
#rail a:hover .t,#rail a.on .t{opacity:1;transform:none}
#rail a.on{color:var(--r-soft)}
#rail a.on .d{background:var(--r);border-color:var(--r);box-shadow:0 0 12px var(--r);transform:scale(1.15)}

.kick{font-family:var(--disp);font-weight:800;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--r-soft);display:flex;align-items:center;gap:12px}
.kick::before{content:"";width:26px;height:2px;background:var(--r);display:inline-block;border-radius:2px}
h1.big{font-family:var(--disp);font-weight:900;font-size:clamp(38px,5.4vw,76px);line-height:1.02;letter-spacing:-.025em;margin:18px 0}
h2.sec{font-family:var(--disp);font-weight:800;font-size:clamp(30px,3.4vw,48px);line-height:1.05;letter-spacing:-.02em;margin:14px 0 10px}
.lead{font-size:clamp(16px,1.5vw,20px);color:var(--mut);max-width:52ch;line-height:1.55}
.kid{font-size:17px;line-height:1.6;color:#e8e8ec;max-width:52ch}
.kid b{color:var(--r-soft);font-weight:700}
.kid .em{background:linear-gradient(transparent 62%,rgba(239,44,57,.32) 0);padding:0 2px}

#cover,#end{text-align:center;align-items:center}
.wordmark{font-family:var(--disp);font-weight:900;font-size:clamp(32px,3.8vw,50px);letter-spacing:-.02em}
.wordmark .pin{display:inline-block;width:.95em;height:.95em;margin-right:10px;vertical-align:-8%;position:relative}
.wordmark .pin::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--r),var(--r-deep));border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 6px 20px rgba(239,44,57,.5)}
.wordmark .pin::after{content:"";position:absolute;left:30%;top:22%;width:40%;height:40%;background:#fff;border-radius:50%}
.wordmark b{color:var(--r)}
#cover .kick,#end .kick{justify-content:center;margin-top:26px}
#cover h1 .l,#end h2 .l{color:var(--r-soft)}
#cover .sub{font-size:clamp(16px,1.6vw,21px);color:var(--mut);max-width:64ch;margin:8px auto 0}
.meta{position:absolute;bottom:34px;left:0;right:0;display:flex;justify-content:space-between;padding:0 88px;font-size:12px;color:var(--mut2);font-family:var(--disp)}
kbd{border:1px solid var(--line2);border-radius:5px;padding:1px 6px;font-family:var(--disp);font-size:10px}
.cta{display:inline-block;margin-top:30px;background:linear-gradient(135deg,var(--r),var(--r-deep));color:#fff;font-family:var(--disp);font-weight:800;font-size:17px;padding:16px 34px;border-radius:999px;box-shadow:0 14px 44px -10px rgba(239,44,57,.6)}
.contact{margin-top:22px;font-size:13px;color:var(--mut)}
.contact b{color:var(--tx)}

.vg{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:34px}
.v{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px}
.v .ic{font-size:30px;margin-bottom:12px}
.v h3{font-family:var(--disp);font-weight:800;font-size:19px;margin-bottom:8px}
.v p{font-size:13.5px;color:var(--mut);line-height:1.55}
.overline{margin-top:30px;font-size:12.5px;color:var(--mut2);font-family:var(--disp)}

.levelintro{position:relative;z-index:2;max-width:1300px;margin:0 auto;width:100%}
.levelintro .no{font-family:var(--disp);font-weight:900;font-size:clamp(70px,9vw,130px);line-height:1;color:transparent;-webkit-text-stroke:2px var(--r);opacity:.9}
.levelintro .who{font-family:var(--disp);font-weight:800;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--r-soft)}
.levelintro h2{font-family:var(--disp);font-weight:900;font-size:clamp(40px,5vw,72px);letter-spacing:-.02em;line-height:1}
.levelintro .lead{margin-top:18px}
.idx{display:flex;flex-wrap:wrap;gap:9px;margin-top:30px;max-width:900px}
.idx span{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--mut);background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:20px}
.idx span b{color:var(--r-soft);margin-right:6px}

.feat{position:relative;z-index:2;display:grid;grid-template-columns:minmax(320px,42%) 1fr;gap:60px;align-items:center;width:100%;max-width:1500px;margin:0 auto}
.feat .txt .num{font-family:var(--disp);font-weight:800;font-size:15px;color:var(--mut2)}
.feat .txt h2{font-family:var(--disp);font-weight:800;font-size:clamp(28px,3vw,44px);line-height:1.06;letter-spacing:-.02em;margin:14px 0 16px}
.feat .txt h2 .hl{color:var(--r-soft)}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
.pill{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--tx);background:var(--panel2);border:1px solid var(--line2);border-radius:20px;padding:6px 12px}
.pill.hot{background:rgba(239,44,57,.14);border-color:rgba(239,44,57,.45);color:var(--r-soft)}

.mockwrap{position:relative}
.mockwrap::after{content:"";position:absolute;inset:-30px;background:radial-gradient(60% 60% at 50% 40%,rgba(239,44,57,.12),transparent 70%);z-index:-1}
.browser{background:var(--panel);border:1px solid var(--line2);border-radius:16px;overflow:hidden;box-shadow:0 40px 90px -30px rgba(0,0,0,.7)}
.browser .top{display:flex;align-items:center;gap:8px;padding:11px 14px;background:#0e0e10;border-bottom:1px solid var(--line)}
.browser .top i{width:11px;height:11px;border-radius:50%;background:#2c2c31;display:inline-block}
.browser .top .url{margin-left:12px;flex:1;background:#18181c;border:1px solid var(--line);border-radius:7px;padding:5px 12px;font-size:11px;color:var(--mut);font-family:var(--disp)}
.browser .top .url b{color:var(--r-soft)}
.browser .body{padding:20px}
.phone{width:270px;margin:0 auto;background:var(--panel);border:8px solid #1c1c20;border-radius:38px;overflow:hidden;box-shadow:0 40px 90px -30px rgba(0,0,0,.8);position:relative}
.phone .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:90px;height:20px;background:#1c1c20;border-radius:12px;z-index:5}
.phone .scr{padding:34px 14px 18px;min-height:500px}
.phone .bnav{position:absolute;bottom:0;left:0;right:0;background:#0e0e10;border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding:9px 6px 11px;font-size:8px;color:var(--mut2);font-family:var(--disp);font-weight:700}
.phone .bnav .bi{display:flex;flex-direction:column;align-items:center;gap:3px}
.phone .bnav .bi i{width:16px;height:16px;border-radius:5px;background:currentColor;opacity:.5}
.phone .bnav .bi.on{color:var(--r-soft)}
.phone .bnav .bi.on i{opacity:1;background:var(--r)}
.app{display:grid;grid-template-columns:152px 1fr;min-height:340px}
.app .side{background:#0e0e10;border-right:1px solid var(--line);padding:14px 12px}
.app .side .lg{display:flex;align-items:center;gap:7px;font-family:var(--disp);font-weight:900;font-size:13px;margin-bottom:16px}
.app .side .lg .m{width:18px;height:18px;background:linear-gradient(135deg,var(--r),var(--r-deep));border-radius:50% 50% 50% 0;transform:rotate(-45deg)}
.app .side .nv{font-size:11.5px;color:var(--mut);padding:7px 9px;border-radius:7px;display:flex;align-items:center;gap:8px;margin-bottom:2px}
.app .side .nv.on{background:rgba(239,44,57,.13);color:var(--r-soft);font-weight:700}
.app .side .nv .ic{width:14px;height:14px;border-radius:4px;background:currentColor;opacity:.5}
.app .main{padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
.kpi .l{font-size:10.5px;color:var(--mut);letter-spacing:.04em;text-transform:uppercase;font-family:var(--disp)}
.kpi .v{font-family:var(--disp);font-weight:800;font-size:22px;margin-top:5px;letter-spacing:-.02em}
.kpi .dl{font-size:11px;margin-top:3px;color:var(--grn);font-weight:600}
.kpi.hi{background:linear-gradient(160deg,rgba(239,44,57,.16),rgba(239,44,57,.03));border-color:rgba(239,44,57,.35)}
.kpi.hi .v{color:var(--r-soft)}
.card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px}
.card .h{font-family:var(--disp);font-size:12.5px;font-weight:700;color:var(--mut);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.card .h .tag{font-size:10px;color:var(--r-soft);background:rgba(239,44,57,.12);border-radius:5px;padding:2px 7px;white-space:nowrap}
.bars{display:flex;align-items:flex-end;gap:9px;height:110px}
.bars .b{flex:1;background:linear-gradient(180deg,var(--r),rgba(239,44,57,.22));border-radius:5px 5px 0 0;min-height:6px}
.line-lbls{display:flex;gap:9px;margin-top:8px}
.line-lbls span{flex:1;text-align:center;font-size:9px;color:var(--mut2);font-family:var(--disp)}
.rows{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.rows .r{display:grid;grid-template-columns:1.6fr 1fr 1fr .8fr;gap:8px;padding:10px 13px;background:var(--panel2);font-size:11.5px;align-items:center}
.rows .r.hd{background:#0e0e10;color:var(--mut);font-family:var(--disp);font-size:10px;letter-spacing:.05em;text-transform:uppercase}
.rows .r b{font-weight:600}
.st{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;display:inline-block;justify-self:start}
.st.ok{background:rgba(34,197,94,.15);color:var(--grn)}
.st.wa{background:rgba(251,191,36,.15);color:var(--amber)}
.st.no{background:rgba(251,113,133,.15);color:var(--red)}
.st.hot{background:rgba(239,44,57,.16);color:var(--r-soft)}
.st.cy{background:rgba(56,189,248,.15);color:var(--cy)}
.list{display:flex;flex-direction:column;gap:7px}
.li{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:11.5px}
.li .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(140deg,#3a3a42,#232328);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;font-family:var(--disp);flex:none;position:relative}
.li .av.hot{background:linear-gradient(140deg,var(--r),var(--r-deep))}
.li .av .dot{position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:50%;border:2px solid var(--panel2)}
.li .g{flex:1;min-width:0}
.li .g b{display:block;font-weight:600}
.li .g small{color:var(--mut);font-size:10px}
/* anel de stories animado */
@keyframes spin{to{transform:rotate(360deg)}}
.storyring{width:52px;height:52px;border-radius:50%;position:relative;flex:none;display:flex;align-items:center;justify-content:center}
.storyring::before{content:"";position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--r),var(--pp),var(--amber),var(--r));animation:spin 3s linear infinite}
.storyring .in{width:44px;height:44px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:17px;position:relative;z-index:2;border:3px solid var(--panel)}
.livepulse{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;color:var(--r-soft);font-family:var(--disp)}
.livepulse::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--r);box-shadow:0 0 0 0 rgba(239,44,57,.6);animation:pulse 1.6s infinite}
@keyframes pulse{70%{box-shadow:0 0 0 9px rgba(239,44,57,0)}100%{box-shadow:0 0 0 0 rgba(239,44,57,0)}}
.chatmsg{background:var(--panel2);border:1px solid var(--line);border-radius:12px 12px 12px 3px;padding:9px 11px;font-size:11px;max-width:86%;margin-bottom:6px}
.chatmsg.me{background:rgba(239,44,57,.14);border-color:rgba(239,44,57,.32);border-radius:12px 12px 3px 12px;margin-left:auto}
.locked{position:relative;border-radius:12px;overflow:hidden}
.locked .blur{filter:blur(5px);opacity:.6}
.locked .lock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(10,10,11,.45)}
.locked .lock .ic{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--r),var(--r-deep));display:flex;align-items:center;justify-content:center;font-size:16px}
.mapmk{position:relative;height:150px;border-radius:12px;background:linear-gradient(160deg,#1d1420,#101014);overflow:hidden}
.mapmk::before{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:24px 24px}
.mapmk .pin{position:absolute;width:14px;height:14px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff}
.big-red{background:linear-gradient(120deg,#7f1d1d,var(--r-deep));border-radius:16px;padding:16px;margin-bottom:10px}
.big-red small{color:rgba(255,255,255,.78);font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;font-weight:800;font-family:var(--disp)}
.big-red b{display:block;font-family:var(--disp);font-size:26px;font-weight:900;margin-top:3px}
.kan{display:flex;gap:7px}
.kan>div{flex:1;background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:10px;padding:8px}
.kan h6{margin:0 0 7px;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);font-family:var(--disp)}
.kan .c{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:7px;font-size:9.5px;margin-bottom:5px}
.kan .c small{color:var(--mut);display:block;font-size:8.5px}

.revgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:30px}
.rev{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px}
.rev .ic{font-size:22px}
.rev h4{font-family:var(--disp);font-weight:800;font-size:14.5px;margin:8px 0 4px}
.rev p{font-size:11.5px;color:var(--mut);line-height:1.5}
.rev b{color:var(--r-soft)}

@media (max-width:980px){
  .slide{padding:56px 26px 64px}
  #rail{display:none}
  .feat{grid-template-columns:1fr;gap:30px}
  .feat .mockwrap{order:-1}
  .vg{grid-template-columns:1fr}
  .revgrid{grid-template-columns:1fr 1fr}
  .meta{padding:0 26px}
  .phone{width:240px}.phone .scr{min-height:440px}
  .app{grid-template-columns:1fr}.app .side{display:none}
}
@media (max-width:560px){.revgrid{grid-template-columns:1fr}.grid4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="bar"><i></i></div>
<div id="hud"><span><b id="cur">01</b> / <span id="tot">00</span></span><span class="k" onclick="document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()">⛶ F</span></div>
<nav id="rail"></nav>
<main id="deck"></main>

<script>
const SHOW_ADMIN = __SHOW_ADMIN__;

const LEVELS = [
  {id:'intro', label:'Início'},
  {id:'user',  label:'Usuário'},
  {id:'estab', label:'Estabelecimento'},
  {id:'com',   label:'Comercial'},
  ...(SHOW_ADMIN?[{id:'admin', label:'Administração'}]:[]),
  {id:'fim',   label:'Fim'},
];

const appShell = (items, active, main, base='') => `
<div class="browser"><div class="top"><i></i><i></i><i></i><div class="url">imhere.app${base}/<b>${active.toLowerCase().replace(/\\s|&/g,'-')}</b></div></div>
<div class="app">
  <div class="side">
    <div class="lg"><span class="m"></span>&nbsp; I'm Here</div>
    ${items.map(n=>`<div class="nv ${n===active?'on':''}"><span class="ic"></span>${n}</div>`).join('')}
  </div>
  <div class="main">${main}</div>
</div></div>`;

const ESTAB_NAV = ['Dashboard','Pessoas agora','No Momento','Cortesias','Premium da Casa','Perfil','Relatórios'];
const COM_NAV = ['Pipeline','Clientes','Estabelecimentos','Comissões','Relatórios'];
const ADMIN_NAV = ['Dashboard','Usuários','Estabelecimentos','Moderação','Planos','Vendas','Relatórios'];

const phone = (scr, activeTab=0) => `<div class="phone"><div class="notch"></div><div class="scr" style="padding-bottom:66px">${scr}</div>
  <div class="bnav">
    ${['Agora','Chat','Cortesias','Perfil'].map((t,i)=>`<span class="bi ${i===activeTab?'on':''}"><i></i>${t}</span>`).join('')}
  </div></div>`;

const SLIDES = [];
const S = (o)=>SLIDES.push(o);

/* ========================= CAPA ========================= */
S({type:'cover'});
S({type:'value'});
S({type:'levelmap'});

/* ========================= 01 USUÁRIO ========================= */
S({type:'intro', level:'user', no:'01', who:'A experiência de quem sai', title:'Usuário',
  desc:'A pergunta de toda sexta-feira — "onde tá bom hoje?" — finalmente tem resposta ao vivo. O usuário vê quantas pessoas estão em cada lugar, faz check-in quando chega e pode conhecer quem está no mesmo rolê. A cidade vira um mapa social.',
  idx:['Descobrir agora','Check-in & status','Quem tá no local','Chat no mesmo rolê','No Momento (stories)','Cortesias','Planos & créditos','Quem visitou seu perfil']});

S({level:'user', n:'Descobrir agora', title:['O mapa da noite, ','ao vivo'],
  kid:'A home mostra os lugares por perto com o número que importa: <b>quantas pessoas estão lá AGORA</b>. Busca, geolocalização e ordenação por movimento — <span class="em">acabou o "será que tá bom?"</span>.',
  pills:['Contagem de presentes ao vivo','Geolocalização + busca','Ordena por movimento','Borda animada = tem stories'],

          <div class="kick" style="margin-top:10px">${s.n}</div>
          <h2>${s.title.map((t,k)=>k%2?`<span class="hl">${t}</span>`:t).join('')}</h2>
          <p class="kid">${s.kid}</p>
          <div class="pills">${(s.pills||[]).map((p,k)=>`<span class="pill ${k===0?'hot':''}">${p}</span>`).join('')}</div>
        </div>
        <div class="mockwrap">${s.mock}</div>
      </div>`;
  }
  deck.appendChild(el);
});

const railEl=document.getElementById('rail');
const firstOf={};
secOrder.forEach((lvl,i)=>{if(firstOf[lvl]===undefined)firstOf[lvl]=i});
LEVELS.forEach(l=>{
  if(firstOf[l.id]===undefined)return;
  const a=document.createElement('a');
  a.href='#';a.dataset.lvl=l.id;
  a.innerHTML=`<span class="d"></span><span class="t">${l.label}</span>`;
  a.onclick=(e)=>{e.preventDefault();goTo(firstOf[l.id])};
  railEl.appendChild(a);
});

const slides=[...document.querySelectorAll('.slide')];
document.getElementById('tot').textContent=String(slides.length).padStart(2,'0');
let idx=0;
function goTo(i){idx=Math.max(0,Math.min(slides.length-1,i));slides[idx].scrollIntoView()}
function next(){goTo(idx+1)} function prev(){goTo(idx-1)}

const io=new IntersectionObserver((es)=>{
  es.forEach(e=>{if(e.isIntersecting){
    idx=+e.target.dataset.i;
    document.getElementById('cur').textContent=String(idx+1).padStart(2,'0');
    document.getElementById('bar').firstElementChild.style.width=((idx)/(slides.length-1)*100)+'%';
    const lvl=e.target.dataset.level;
    [...railEl.children].forEach(a=>a.classList.toggle('on',a.dataset.lvl===lvl));
  }});
},{threshold:.55});
slides.forEach(s=>io.observe(s));

addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();next()}
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();prev()}
  if(e.key==='Home')goTo(0);if(e.key==='End')goTo(slides.length-1);
  if(e.key.toLowerCase()==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}
});
</script>
</body>
